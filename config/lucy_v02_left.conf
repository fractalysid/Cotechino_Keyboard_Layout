CONFIG_ZMK_KEYBOARD_NAME="Lucy X2"

CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y
# Definizioni identità
CONFIG_USB_DEVICE_PRODUCT="Lucy X2"
