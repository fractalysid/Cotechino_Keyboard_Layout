#CONFIG_ZMK_KEYBOARD_NAME="Lucy X2"

# Global config
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=y

# Enables mouse emulation
CONFIG_ZMK_POINTING=y

# Enables battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=120

# For longer macros
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=128

# Enable this in case of bt issues
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y
# CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Low level setting for GATT subscriptions. Set to n to work around an annoying Windows bug with battery notifications. This defaults to "y"
# CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Turn on logging, and set ZMK logging to debug output
#CONFIG_ZMK_USB_LOGGING=y


# ----------------
# Disabilita il controller software split se Zephyr 4.1 tenta di caricarne uno proprio
#CONFIG_BT_CTLR=y
#CONFIG_BT_LL_SW_SPLIT=y

# DISABILITA questa opzione se presente, spesso causa doppie registrazioni su 4.1
# CONFIG_BT_CTLR_SDC=n 

# Forza la priorità dell'interrupt per evitare collisioni con lo stack USB
#CONFIG_ZMK_BLE_THREAD_PRIORITY=4
